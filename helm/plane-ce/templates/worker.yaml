apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plane.fullname" . }}-worker
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "worker" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: {{ include "plane.image" (dict "registry" .Values.image.registry "name" "plane-backend" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              python manage.py wait_for_db &&
              python manage.py wait_for_migrations &&
              celery -A plane worker -l info
          envFrom:
            - configMapRef:
                name: {{ include "plane.fullname" . }}-config
            - secretRef:
                name: {{ include "plane.secretName" . }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
