{{- if .Values.redis.local }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "plane.fullname" . }}-redis
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "redis" }}
    {{- include "plane.selectorLabels" $ctx | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "plane.fullname" . }}-redis
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "plane.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "redis" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: valkey
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
{{- end }}
