apiVersion: v1
kind: Service
metadata:
  name: {{ include "plane.fullname" . }}-api
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "api" }}
    {{- include "plane.selectorLabels" $ctx | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plane.fullname" . }}-api
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "api" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
      annotations:
        {{- include "plane.configChecksum" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: {{ include "plane.image" (dict "registry" .Values.image.registry "name" "plane-backend" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              python manage.py wait_for_db &&
              python manage.py wait_for_migrations &&
              python manage.py register_instance &&
              python manage.py configure_instance &&
              python manage.py create_bucket &&
              python manage.py clear_cache &&
              python manage.py collectstatic --noinput &&
              gunicorn -w {{ .Values.api.gunicornWorkers }} -k uvicorn.workers.UvicornWorker plane.asgi:application --bind 0.0.0.0:8000
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "plane.fullname" . }}-config
            - secretRef:
                name: {{ include "plane.secretName" . }}
          startupProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
