apiVersion: v1
kind: Service
metadata:
  name: {{ include "plane.fullname" . }}-admin
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "admin" }}
    {{- include "plane.selectorLabels" $ctx | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plane.fullname" . }}-admin
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "admin" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
      annotations:
        {{- include "plane.configChecksum" . | nindent 8 }}
    spec:
      containers:
        - name: admin
          image: {{ include "plane.image" (dict "registry" .Values.image.registry "name" "plane-admin" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "plane.fullname" . }}-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
