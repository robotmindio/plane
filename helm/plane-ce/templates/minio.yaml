{{- if .Values.minio.local }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "plane.fullname" . }}-minio
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9090
      targetPort: 9090
  selector:
    {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "minio" }}
    {{- include "plane.selectorLabels" $ctx | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "plane.fullname" . }}-minio
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "plane.fullname" . }}-minio
  replicas: 1
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "minio" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: ["server", "/export", "--console-address", ":9090"]
          ports:
            - containerPort: 9000
            - containerPort: 9090
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "plane.secretName" . }}
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "plane.secretName" . }}
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: data
              mountPath: /export
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.minio.storageClass }}
        storageClassName: {{ .Values.minio.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage }}
{{- end }}
