apiVersion: v1
kind: Service
metadata:
  name: {{ include "plane.fullname" . }}-space
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "space" }}
    {{- include "plane.selectorLabels" $ctx | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plane.fullname" . }}-space
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.space.replicas }}
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "space" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: space
          image: {{ include "plane.image" (dict "registry" .Values.image.registry "name" "plane-space" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /spaces/
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.space.resources | nindent 12 }}
