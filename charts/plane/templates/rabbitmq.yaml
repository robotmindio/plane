{{- if .Values.rabbitmq.local }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "plane.fullname" . }}-rabbitmq
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
  selector:
    {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "rabbitmq" }}
    {{- include "plane.selectorLabels" $ctx | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "plane.fullname" . }}-rabbitmq
  labels:
    {{- include "plane.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "plane.fullname" . }}-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      {{- $ctx := dict "Chart" .Chart "Release" .Release "Values" .Values "component" "rabbitmq" }}
      {{- include "plane.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plane.selectorLabels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image }}
          ports:
            - containerPort: 5672
              protocol: TCP
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ .Values.rabbitmq.user | quote }}
            - name: RABBITMQ_DEFAULT_VHOST
              value: {{ .Values.rabbitmq.vhost | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "plane.secretName" . }}
                  key: RABBITMQ_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 60
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.rabbitmq.storageClass }}
        storageClassName: {{ .Values.rabbitmq.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
{{- end }}
